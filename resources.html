    function getCategoriesForState(key) {
      const data = stateData[key];
      const stateCategories = data ? data.categories : [];
      return [...stateCategories, nationalAppsCategory, nationalLearnCategory];
    }

    function toTitleCase(str) {
      return str.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    const producePngs = [
      'Avocado.png','Beet.png','Cabbage.png','Carrot.png','Corn.png',
      'KAle.png','Pepper.png','Potato.png','Raspberry-01.png','Strawberry.png',
      'Tomato.png','apple.png','banana.png','eggplant.png','pumpkin.png'
    ];

    let lastProduce = null;
    function randomProduce() {
      const pool = producePngs.filter(p => p !== lastProduce);
      const pick = pool[Math.floor(Math.random() * pool.length)];
      lastProduce = pick;
      return pick;
    }

    function renderItem(item) {
      const png = randomProduce();
      return `<div style="display: flex; align-items: center; padding: 2vh 0; border-bottom: 2px solid #49190F;">
        <div style="flex: 0 0 40vw; display: flex; align-items: center; gap: 0.6vw;">
          <img src="${png}" alt="" style="width: 1.8vw; height: auto; flex-shrink: 0;">
          <a href="${item.url}" target="_blank" style="font-family: 'Platform', sans-serif; font-weight: 500; font-size: 1.56vw; color: #49190F; white-space: nowrap; text-decoration: none;" class="list-link">${item.name}</a>
        </div>
        <span style="font-family: 'Outfit', sans-serif; font-weight: 400; font-size: 1.04vw; color: #49190F; line-height: 1.5; width: 34.91vw;">${item.desc}</span>
      </div>`;
    }

    function renderCategory(cat, first) {
      const margin = first ? '' : 'margin-top: 7vw;';
      return `<div style="${margin}">
        <p style="font-family: 'Platform', sans-serif; font-weight: 500; font-size: 2.78vw; color: #49190F; margin: 0 0 3vh 0; line-height: 1.1;">${cat.title}</p>
        ${cat.items.map(renderItem).join('')}
      </div>`;
    }

    function loadState(raw) {
      if (!raw) return;
      const key = raw.toLowerCase().trim();
      const display = toTitleCase(raw.trim());
      const upper = raw.trim().toUpperCase();

      document.getElementById('state-input').textContent = upper;

      const categories = getCategoriesForState(key);
      document.getElementById('state-description').textContent =
        `Resources in ${display} that help you and your family reduce food waste, find affordable food options, and access sustainably sourced products.`;
      document.getElementById('resources-list').innerHTML =
        categories.map((cat, i) => renderCategory(cat, i === 0)).join('');
    }

    // State name → FIPS code mapping
    const stateToFips = {
      'alabama':'01','alaska':'02','arizona':'04','arkansas':'05','california':'06',
      'colorado':'08','connecticut':'09','delaware':'10','florida':'12','georgia':'13',
      'hawaii':'15','idaho':'16','illinois':'17','indiana':'18','iowa':'19','kansas':'20',
      'kentucky':'21','louisiana':'22','maine':'23','maryland':'24','massachusetts':'25',
      'michigan':'26','minnesota':'27','mississippi':'28','missouri':'29','montana':'30',
      'nebraska':'31','nevada':'32','new hampshire':'33','new jersey':'34','new mexico':'35',
      'new york':'36','north carolina':'37','north dakota':'38','ohio':'39','oklahoma':'40',
      'oregon':'41','pennsylvania':'42','rhode island':'44','south carolina':'45',
      'south dakota':'46','tennessee':'47','texas':'48','utah':'49','vermont':'50',
      'virginia':'51','washington':'53','west virginia':'54','wisconsin':'55','wyoming':'56'
    };

    let mapReady = false;
    let pendingState = 'arizona';

    function highlightState(key) {
      if (!mapReady) { pendingState = key; return; }
      const fips = stateToFips[key];
      document.querySelectorAll('#us-map path.state').forEach(p => {
        p.style.fill = String(p.dataset.fips) === fips ? '#246C36' : '#c8dbc4';
      });
    }

    // Patch loadState to also update the map
    const _origLoad = loadState;
    loadState = function(raw) {
      _origLoad(raw);
      highlightState(raw.toLowerCase().trim());
    };

    // Load D3 map after page load
    window.addEventListener('load', () => {
      const d3Script = document.createElement('script');
      d3Script.src = 'https://d3js.org/d3.v7.min.js';
      d3Script.onload = () => {
        const topoScript = document.createElement('script');
        topoScript.src = 'https://cdn.jsdelivr.net/npm/topojson@3/dist/topojson.min.js';
        topoScript.onload = () => {
          const mapDiv = document.getElementById('us-map');
          const w = mapDiv.clientWidth || mapDiv.offsetWidth || 600;
          const h = w * 0.62;

          const svg = d3.select('#us-map').append('svg')
            .attr('width', '100%')
            .attr('viewBox', `0 0 ${w} ${h}`);

          const projection = d3.geoAlbersUsa().fitSize([w, h], { type: 'Sphere' });
          const path = d3.geoPath().projection(projection);

          fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
            .then(r => r.json())
            .then(us => {
              const features = topojson.feature(us, us.objects.states).features;
              projection.fitSize([w, h], topojson.feature(us, us.objects.states));

              svg.selectAll('path.state')
                .data(features)
                .enter().append('path')
                .attr('class', 'state')
                .attr('d', path)
                .attr('data-fips', d => String(d.id).padStart(2, '0'))
                .style('fill', '#c8dbc4')
                .style('stroke', '#fff')
                .style('stroke-width', '0.8');

              mapReady = true;
              highlightState(pendingState);
            });
        };
        document.head.appendChild(topoScript);
      };
      document.head.appendChild(d3Script);
    });

    loadState('Arizona');
  </script>
